﻿<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHS Consultation Risk Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0
    }

    :root {
        --navy: #0F1F3D;
        --blue: #1A3A6B;
        --mid: #2E5FA3;
        --light-blue: #EBF1FB;
        --red: #B91C1C;
        --red-light: #FEF2F2;
        --amber: #B45309;
        --amber-light: #FFFBEB;
        --green: #166534;
        --green-light: #F0FDF4;
        --slate: #64748B;
        --border: #E2E8F0;
        --bg: #F8FAFC;
        --white: #FFFFFF;
        --text: #1E293B;
        --text-light: #64748B;
        --font-sans: "DM Sans", system-ui, sans-serif;
        --font-mono: "DM Mono", monospace
    }

    body {
        font-family: var(--font-sans);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh
    }

    .topbar {
        background: var(--navy);
        color: white;
        padding: 0 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 56px;
        position: sticky;
        top: 0;
        z-index: 100
    }

    .topbar-left {
        display: flex;
        align-items: center;
        gap: 12px
    }

    .topbar-logo {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.12em;
        color: rgba(255, 255, 255, 0.5);
        text-transform: uppercase
    }

    .topbar-title {
        font-size: 15px;
        font-weight: 500;
        color: white
    }

    .topbar-right {
        display: flex;
        align-items: center;
        gap: 16px
    }

    .topbar-badge {
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 4px;
        font-weight: 500
    }

    .tb-crit {
        background: rgba(185, 28, 28, 0.3);
        color: #FCA5A5
    }

    .tb-high {
        background: rgba(180, 83, 9, 0.3);
        color: #FCD34D
    }

    .tb-update {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4)
    }

    .main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem
    }

    .loading {
        text-align: center;
        padding: 4rem;
        color: var(--text-light);
        font-size: 14px
    }

    .alert-bar {
        background: var(--red-light);
        border: 1px solid #FECACA;
        border-radius: 10px;
        padding: 14px 18px;
        margin-bottom: 1.5rem;
        display: none
    }

    .alert-bar.show {
        display: block
    }

    .alert-bar-top {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px
    }

    .alert-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--red);
        flex-shrink: 0;
        animation: pulse 2s infinite
    }

    @keyframes pulse {
        0%, 100% {
            opacity:1
        }

        50% {
            opacity: 0.4
        }
    }

    .alert-bar-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--red);
        flex: 1
    }

    .alert-bar-dismiss {
        font-size: 11px;
        color: var(--red);
        cursor: pointer;
        border: 1px solid #FCA5A5;
        border-radius: 4px;
        padding: 2px 10px;
        background: none
    }

    .alert-items {
        display: flex;
        flex-direction: column;
        gap: 6px
    }

    .alert-item {
        background: rgba(255, 255, 255, 0.7);
        border-radius: 6px;
        padding: 8px 12px;
        cursor: pointer;
        border-left: 3px solid var(--red)
    }

    .alert-item:hover {
        background: white
    }

    .alert-item-name {
        font-size: 12px;
        font-weight: 600;
        color: var(--red);
        margin-bottom: 2px
    }

    .alert-item-what {
        font-size: 11px;
        color: #7F1D1D;
        line-height: 1.4
    }

    .countdown-bar {
        background: linear-gradient(135deg, #7F1D1D 0%, #991B1B 100%);
        color: white;
        border-radius: 10px;
        padding: 12px 18px;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 12px
    }

    .cd-days {
        font-size: 28px;
        font-weight: 600;
        font-family: var(--font-mono);
        min-width: 40px
    }

    .cd-label {
        font-size: 12px;
        opacity: 0.8;
        line-height: 1.4
    }

    .cd-label strong {
        display: block;
        font-size: 13px;
        opacity: 1
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 1.5rem
    }

    .stat {
        background: white;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 16px
    }

    .stat-val {
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 2px
    }

    .stat-lbl {
        font-size: 11px;
        color: var(--text-light);
        font-weight: 500
    }

    .stat-sub {
        font-size: 10px;
        color: var(--text-light);
        margin-top: 2px
    }

    .tabs {
        display: flex;
        gap: 0;
        margin-bottom: 1.25rem;
        border-bottom: 2px solid var(--border)
    }

    .tab {
        font-size: 13px;
        font-weight: 500;
        padding: 8px 16px;
        cursor: pointer;
        border: none;
        background: none;
        color: var(--text-light);
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        transition: all 0.15s
    }

    .tab:hover {
        color: var(--text)
    }

    .tab.active {
        color: var(--mid);
        border-bottom-color: var(--mid)
    }

    .section-hdr {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-light);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 8px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border)
    }

    .section-hdr.red {
        color: var(--red)
    }

    .section-hdr.amber {
        color: var(--amber)
    }

    .card {
        background: white;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 16px;
        margin-bottom: 6px;
        cursor: pointer;
        transition: all 0.15s;
        border-left: 4px solid transparent
    }

    .card:hover {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        transform: translateY(-1px)
    }

    .card.esc {
        border-left-color: var(--red)
    }

    .card.warn {
        border-left-color: var(--amber)
    }

    .card.info {
        border-left-color: var(--mid)
    }

    .card.newp {
        border-left-color: var(--green)
    }

    .card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 6px
    }

    .card-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text)
    }

    .card-num {
        font-size: 11px;
        color: var(--text-light);
        margin-right: 4px;
        font-weight: 400
    }

    .card-badges {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        justify-content: flex-end;
        flex-shrink: 0
    }

    .card-what {
        font-size: 12px;
        color: var(--text-light);
        line-height: 1.5
    }

    .badge {
        font-size: 10px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 4px;
        white-space: nowrap;
        letter-spacing: 0.02em
    }

    .b-crit {
        background: var(--red-light);
        color: var(--red)
    }

    .b-high {
        background: var(--amber-light);
        color: var(--amber)
    }

    .b-med {
        background: var(--light-blue);
        color: var(--mid)
    }

    .b-clos {
        background: #F1F5F9;
        color: var(--slate)
    }

    .b-now {
        background: var(--red-light);
        color: var(--red)
    }

    .b-near {
        background: var(--amber-light);
        color: var(--amber)
    }

    .b-unk {
        background: #F1F5F9;
        color: var(--slate)
    }

    .b-new {
        background: var(--green-light);
        color: var(--green)
    }

    .ct {
        font-size: 10px;
        font-weight: 500;
        padding: 2px 7px;
        border-radius: 4px;
        white-space: nowrap
    }

    .ct-esc {
        background: var(--red-light);
        color: var(--red)
    }

    .ct-warn {
        background: var(--amber-light);
        color: var(--amber)
    }

    .ct-info {
        background: var(--light-blue);
        color: var(--mid)
    }

    .ct-new {
        background: var(--green-light);
        color: var(--green)
    }

    .no-change-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 4px
    }

    .nc-pill {
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 20px;
        background: white;
        border: 1px solid var(--border);
        color: var(--text-light);
        cursor: pointer;
        transition: all 0.1s
    }

    .nc-pill:hover {
        background: var(--light-blue);
        color: var(--mid);
        border-color: #BFDBFE
    }

    .detail {
        background: white;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem;
        margin-top: 1rem;
        display: none
    }

    .detail.show {
        display: block
    }

    .detail-hdr {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 1rem
    }

    .detail-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text)
    }

    .detail-icb {
        font-size: 12px;
        color: var(--text-light);
        margin-top: 3px
    }

    .detail-close {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-light);
        font-size: 20px;
        line-height: 1
    }

    .detail-change {
        background: var(--red-light);
        padding: 10px 14px;
        border-radius: 8px;
        border-left: 4px solid var(--red);
        margin-bottom: 1rem
    }

    .detail-change-lbl {
        font-size: 10px;
        font-weight: 600;
        color: var(--red);
        margin-bottom: 4px;
        letter-spacing: 0.05em;
        text-transform: uppercase
    }

    .detail-change-text {
        font-size: 12px;
        color: #7F1D1D;
        line-height: 1.6
    }

    .detail-meta {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 1rem
    }

    .df label {
        font-size: 10px;
        color: var(--text-light);
        display: block;
        margin-bottom: 4px;
        letter-spacing: 0.04em;
        text-transform: uppercase
    }

    .df p {
        font-size: 12px;
        color: var(--text);
        font-weight: 500
    }

    .divider {
        height: 1px;
        background: var(--border);
        margin: 1rem 0
    }

    .ds {
        margin-bottom: 10px
    }

    .ds label {
        font-size: 10px;
        color: var(--text-light);
        display: block;
        margin-bottom: 4px;
        letter-spacing: 0.04em;
        text-transform: uppercase
    }

    .ds p {
        font-size: 12px;
        color: var(--text);
        line-height: 1.6
    }

    .detail-actions {
        display: flex;
        gap: 8px;
        margin-top: 1rem;
        flex-wrap: wrap
    }

    .filter-row {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
        align-items: center
    }

    .filter-row label {
        font-size: 12px;
        color: var(--text-light)
    }

    .filter-row select {
        font-size: 12px;
        padding: 5px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: white;
        color: var(--text);
        font-family: var(--font-sans)
    }

    .pr-row {
        background: white;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 5px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.1s
    }

    .pr-row:hover {
        background: var(--bg);
        border-color: #CBD5E1
    }

    .pr-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0
    }

    .pr-num {
        font-size: 11px;
        color: var(--text-light);
        min-width: 24px;
        flex-shrink: 0;
        font-family: var(--font-mono)
    }

    .pr-name {
        font-size: 12px;
        font-weight: 500;
        color: var(--text);
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap
    }

    .pr-icb {
        font-size: 10px;
        color: var(--text-light);
        flex-shrink: 0;
        margin-right: 4px
    }

    .pr-badges {
        display: flex;
        gap: 4px;
        flex-shrink: 0
    }

    .hist-entry {
        background: white;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
        margin-bottom: 6px
    }

    .hist-date {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 4px
    }

    .hist-sum {
        font-size: 12px;
        color: var(--text-light);
        line-height: 1.5
    }

    .hist-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 8px
    }

    .empty {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--text-light);
        font-size: 13px
    }

    .info-panel {
        background: white;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1.5rem;
        margin-bottom: 1rem
    }

    .info-panel h3 {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 6px
    }

    .info-panel p {
        font-size: 12px;
        color: var(--text-light);
        line-height: 1.6;
        margin-bottom: 8px
    }

    .info-box {
        background: var(--light-blue);
        border-radius: 8px;
        padding: 12px 14px;
        border-left: 4px solid var(--mid)
    }

    .info-box label {
        font-size: 10px;
        font-weight: 600;
        color: var(--mid);
        display: block;
        margin-bottom: 4px;
        letter-spacing: 0.05em;
        text-transform: uppercase
    }

    .info-box p {
        font-size: 12px;
        color: var(--text);
        line-height: 1.5;
        margin: 0
    }

    .source-link {
        font-size: 11px;
        color: var(--mid);
        text-decoration: none;
        font-family: var(--font-mono);
        display: block;
        margin-top: 3px
    }

    .source-link:hover {
        text-decoration: underline
    }

    @media (max-width: 768px) {
        .grid {
            grid-template-columns:repeat(2, 1fr)
        }

        .detail-meta {
            grid-template-columns:1fr 1fr
        }

        .topbar-right .tb-update {
            display:none
        }

        .main {
            padding: 1rem
        }
    }
    </style>
</head>

    <div class="main" id="main-content">

    const WARD31A = new Date("2026-07-31");
    let proposals = [];
    let weekLog = [];
    let lastUpdated = null;
    let dismissed = false;

    async function loadData() {
        try {
            const r = await fetch(DATA_URL + "?t=" + Date.now());
            const d = await r.json();
            // Merge dynamic data with static proposal definitions
            proposals = PROPOSALS.map(def => {
                const dyn = d.proposals ? d.proposals.find(p => p.id === def.id) : null;
                return dyn ? {
                    ...def,
                    ...dyn
                } : {
                    ...def,
                    risk: "Medium",
                    tl: "NEAR",
                    changed: false,
                    ct: null,
                    cw: null
                };
            });
            weekLog = d.weekLog || [];
            lastUpdated = d.lastUpdated || null;
            render();
        } catch (e) {
            // Fall back to defaults if data.json not yet available
            proposals = PROPOSALS.map(def => ({
                ...def,
                risk: "Medium",
                tl: "NEAR",
                changed: false,
                ct: null,
                cw: null
            }));
            render();
        }
    }

    function rc(r) {
        return r === "Critical" ? "b-crit" : r === "High" ? "b-high" : r === "Closed" ? "b-clos" : "b-med"
    }
    function tc(t) {
        return t === "NOW" ? "b-now" : t === "NEAR" ? "b-near" : "b-unk"
    }
    function cardBorder(ct) {
        if (!ct)
            return "";
        if (ct.includes("days") || ct.includes("lapsed") || ct.includes("closure"))
            return "esc";
        if (ct.includes("Section 31") || ct.includes("Scrutiny") || ct.includes("enforcement"))
            return "warn";
        if (ct.includes("New —") || ct.includes("launched") || ct.includes("withdrawal"))
            return "newp";
        return "info";
    }
    function ctCls(ct) {
        const c = cardBorder(ct || "");
        return c === "esc" ? "ct-esc" : c === "warn" ? "ct-warn" : c === "newp" ? "ct-new" : "ct-info";
    }
    function daysTo() {
        return Math.max(0, Math.ceil((WARD31A - new Date()) / (1000 * 60 * 60 * 24)));
    }

    function render() {
        document.getElementById("top-crit").textContent = proposals.filter(p => p.risk === "Critical").length + " Critical";
        document.getElementById("top-high").textContent = proposals.filter(p => p.risk === "High").length + " High";
        document.getElementById("top-updated").textContent = lastUpdated ? "Updated " + lastUpdated : "Awaiting first update";

        const main = document.getElementById("main-content");
        const days = daysTo();
        const changed = proposals.filter(p => p.changed && p.risk !== "Closed");

        let html = "";

        // Countdown
        if (days > 0 && days <= 60) {
            html += `<div class="countdown-bar"><div class="cd-days">${days}</div><div class="cd-label"><strong>Ward 31A — days until closure</strong>No formal S244 consultation plan published · CNTW · N East & N Cumbria</div></div>`;
        }

        // Alert bar
        const critChanged = changed.filter(p => p.risk === "Critical" || p.risk === "High");
        if (critChanged.length && !dismissed) {
            html += `<div class="alert-bar show" id="alert-bar">
      <div class="alert-bar-top"><div class="alert-dot"></div><div class="alert-bar-title">${critChanged.filter(p => p.risk === "Critical").length} critical + ${critChanged.filter(p => p.risk === "High").length} high-risk changes need attention</div><button class="alert-bar-dismiss" onclick="dismissAlerts()">Dismiss</button></div>
      <div class="alert-items">${critChanged.slice(0, 4).map(p => `<div class="alert-item" onclick="showDetail(${p.id})"><div class="alert-item-name">${p.name}</div><div class="alert-item-what">${p.cw || ""}</div></div>`).join("")}</div>
    </div>`
            ;
        }

        // Stats
        html += `<div class="grid">
    <div class="stat"><div class="stat-val" style="color:var(--red)">${proposals.filter(p => p.risk === "Critical").length}</div><div class="stat-lbl">Critical / NOW</div><div class="stat-sub">Immediate action</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--amber)">${proposals.filter(p => p.risk === "High").length}</div><div class="stat-lbl">High risk</div><div class="stat-sub">Close monitoring</div></div>
    <div class="stat"><div class="stat-val">${proposals.filter(p => p.risk !== "Closed").length}</div><div class="stat-lbl">Total proposals</div><div class="stat-sub">26 ICB footprints</div></div>
    <div class="stat"><div class="stat-val">${weekLog.length}</div><div class="stat-lbl">Weeks tracked</div><div class="stat-sub">${lastUpdated ? "last: " + lastUpdated : "no updates yet"}</div></div>
  </div>`
        ;

        // Tabs
        html += `<div class="tabs">
    <button class="tab active" id="tab-week" onclick="setTab('week')">This week</button>
    <button class="tab" id="tab-all" onclick="setTab('all')">All proposals</button>
    <button class="tab" id="tab-hist" onclick="setTab('hist')">History</button>
    <button class="tab" id="tab-about" onclick="setTab('about')">About</button>
  </div>`




        ;

        html += `<div id="view-week">${renderWeek()}</div>
    <div id="view-all" style="display:none">${renderAll()}</div>
    <div id="view-hist" style="display:none">${renderHistory()}</div>
    <div id="view-about" style="display:none">${renderAbout()}</div>
    <div class="detail" id="detail"></div>`
        ;

        main.innerHTML = html;
    }

    function renderWeek() {
        const changed = proposals.filter(p => p.changed && p.risk !== "Closed");
        const nochange = proposals.filter(p => !p.changed && p.risk !== "Closed");
        const closed = proposals.find(p => p.risk === "Closed");
        if (!changed.length)
            return `<div class="empty">No changes recorded this week.<br>Check back after the next monitoring run.</div>`;
        let html = "";
        const crit = changed.filter(p => p.risk === "Critical");
        const high = changed.filter(p => p.risk === "High");
        const med = changed.filter(p => p.risk === "Medium");
        if (crit.length)
            html += `<div style="margin-bottom:1.5rem"><div class="section-hdr red">Requires immediate attention — ${crit.length}</div>${crit.map(makeCard).join("")}</div>`;
        if (high.length)
            html += `<div style="margin-bottom:1.5rem"><div class="section-hdr amber">Risk worsening — ${high.length}</div>${high.map(makeCard).join("")}</div>`;
        if (med.length)
            html += `<div style="margin-bottom:1.5rem"><div class="section-hdr">Developments to note — ${med.length}</div>${med.map(makeCard).join("")}</div>`;
        if (nochange.length) {
            html += `<div><div class="section-hdr">No change this week — ${nochange.length}</div><div class="no-change-pills">`;
            html += nochange.map(p => `<span class="nc-pill" onclick="showDetail(${p.id})">${p.n}. ${p.name.split("—")[0].trim()}</span>`).join("");
            if (closed)
                html += `<span class="nc-pill" onclick="showDetail(${closed.id})" style="opacity:0.5">20. Yewdale</span>`;
            html += "</div></div>";
        }
        return html;
    }

    function makeCard(p) {
        return `<div class="card ${cardBorder(p.ct || "")}" onclick="showDetail(${p.id})">
    <div class="card-top"><span class="card-name"><span class="card-num">${p.n}.</span>${p.name}</span>
    <div class="card-badges"><span class="badge ${rc(p.risk)}">${p.risk}</span><span class="badge ${tc(p.tl)}">${p.tl}</span>${p.ct ? `<span class="ct ${ctCls(p.ct)}">${p.ct}</span>` : ""}</div></div>
    <div class="card-what">${p.cw || ""}</div></div>`;
    }

    function renderAll(rf="all", rcf="all") {
        const regions = [...new Set(PROPOSALS.map(p => p.region))];
        let filtered = proposals;
        if (rf !== "all")
            filtered = filtered.filter(p => p.region === rf);
        if (rcf !== "all")
            filtered = filtered.filter(p => p.risk === rcf);
        let html = `<div class="filter-row">
    <label>Region:</label><select onchange="updateAll(this.value,document.getElementById('rc-filter').value)"><option value="all">All regions</option>${regions.map(r => `<option value="${r}"${rf === r ? " selected" : ""}>${r}</option>`).join("")}</select>
    <label>Risk:</label><select id="rc-filter" onchange="updateAll(document.querySelector('#view-all select').value,this.value)"><option value="all">All</option><option value="Critical"${rcf === "Critical" ? " selected" : ""}>Critical</option><option value="High"${rcf === "High" ? " selected" : ""}>High</option><option value="Medium"${rcf === "Medium" ? " selected" : ""}>Medium</option></select>
  </div>`
        ;
        ["Critical", "High", "Medium", "Closed"].forEach(r => {
            const grp = filtered.filter(p => p.risk === r);
            if (!grp.length)
                return;
            html += `<div style="margin-bottom:1rem"><div class="section-hdr">${r} — ${grp.length}</div>`;
            grp.forEach(p => {
                html += `<div class="pr-row" onclick="showDetail(${p.id})">
      <div class="pr-dot" style="background:${p.changed ? "#B91C1C" : p.risk === "High" ? "#B45309" : "#94A3B8"}"></div>
      <span class="pr-num">${p.n}</span><span class="pr-name">${p.name}</span>
      <span class="pr-icb">${p.icb}</span>
      <div class="pr-badges"><span class="badge ${rc(p.risk)}">${p.risk}</span>${p.tl !== "NA" ? `<span class="badge ${tc(p.tl)}">${p.tl}</span>` : ""}</div>
    </div>`
                ;
            });
            html += "</div>";
        });
        return html;
    }

    function updateAll(rf, rcf) {
        document.getElementById("view-all").innerHTML = renderAll(rf, rcf);
    }

    function renderHistory() {
        if (!weekLog.length)
            return `<div class="empty">No weekly updates have been saved yet.</div>`;
        return [...weekLog].reverse().map(w => `<div class="hist-entry">
    <div class="hist-date">Week commencing ${w.wc || "—"} · ${w.changes || 0} change${(w.changes || 0) !== 1 ? "s" : ""}${w.auto ? " · automated" : ""}</div>
    <div class="hist-sum">${w.summary || ""}</div>
    ${w.props && w.props.length ? `<div class="hist-chips">${w.props.map(c => `<span class="badge ${rc(c.risk)}">${c.n}. ${c.name}</span>`).join("")}</div>` : ""}</div>`).join("");
    }

    function renderAbout() {
        return `<div class="info-panel">
    <h3>NHS Consultation Risk Tracker</h3>
    <p>This dashboard tracks 32 NHS service reconfiguration proposals across 26 ICB footprints in England, monitoring compliance with Section 244 consultation obligations under the NHS Act 2006.</p>
    <p>Data is updated automatically by the NHS England Service Reconfiguration Directorate team. This page reads live from a data file updated daily — refresh to see the latest results.</p>
  </div>
  <div class="info-panel">
    <h3>Risk levels</h3>
    <p><strong>Critical / NOW</strong> — S244 obligation at immediate risk. Action required before any service change.</p>
    <p><strong>High / NEAR</strong> — Significant risk within 12 months. Active monitoring required.</p>
    <p><strong>Medium / FAR</strong> — Risk identified but not imminent. Monitor quarterly.</p>
    <p><strong>Closed</strong> — Precedent case. Outcome informs approach to live proposals.</p>
  </div>`










        ;
    }

    function showDetail(id) {
        const p = proposals.find(x => x.id === id);
        if (!p)
            return;
        const panel = document.getElementById("detail");
        panel.className = "detail show";
        panel.innerHTML = `
    <div class="detail-hdr">
      <div><div class="detail-title">${
        p.n}. ${p.name}</div><div class="detail-icb">${p.icb} · ${p.region}</div></div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    ${

        p.changed && p.cw ? `<div class="detail-change"><div class="detail-change-lbl">What changed this week</div><div class="detail-change-text">${p.cw}</div></div>` : ""}
    <div class="detail-meta">
      <div class="df"><label>Risk</label><p><span class="badge ${
        rc(p.risk)}">${p.risk}</span></p></div>
      <div class="df"><label>Timeline</label><p>${p.tl !== "NA" ? `<span class="badge ${tc(p.tl)}">${p.tl}</span>` : p.tl}</p></div>
      <div class="df"><label>Status</label><p>${p.changed ? "Changed — " + (p.ct || "") : "Stable"}</p></div>
      <div class="df"><label>Sources</label><p>${p.sources && p.sources.length ? p.sources.length + " monitored" : "—"}</p></div>
    </div>
    <div class="divider"></div>
    <div class="ds"><label>Why this matters</label><p>${

        p.why || ""}</p></div>
    <div class="ds"><label>Escalation status</label><p>${p.esc || ""}</p></div>
    <div class="ds"><label>Action required</label><p>${p.action || ""}</p></div>
    ${p.sources && p.sources.length ? `<div class="ds"><label>Sources monitored</label>${p.sources.map(s => `<a class="source-link" href="${s}" target="_blank">${s.replace("https://", "").split("/")[0]}</a>`).join("")}</div>` : ""}
  `
        ;
        panel.scrollIntoView({
            behavior: "smooth",
            block: "nearest"
        });
    }

    function closeDetail() {
        document.getElementById("detail").className = "detail";
    }
    function dismissAlerts() {
        dismissed = true;
        const b = document.getElementById("alert-bar");
        if (b)
            b.style.display = "none";
    }

    function setTab(t) {
        ["week", "all", "hist", "about"].forEach(v => {
            const el = document.getElementById("view-" + v);
            const tab = document.getElementById("tab-" + v);
            if (el)
                el.style.display = v === t ? "block" : "none";
            if (tab)
                tab.classList.toggle("active", v === t);
        });
    }

    loadData();
    </script>
